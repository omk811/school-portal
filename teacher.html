<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم المعلم — الأستاذ خليل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --p: #1a5276; --s: #2e86c1; --a: #f39c12; --g: #27ae60; --r: #e74c3c;
  --bd: #d5e8f5; --bg: #f4f9fd; --mu: #7f8c8d; --text: #1c2833;
  --sh: 0 8px 25px rgba(26,82,118,0.08);
  --sh-hover: 0 12px 35px rgba(26,82,118,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.6; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

/* Header & Tabs */
header { background: linear-gradient(135deg, var(--p), var(--s)); color: #fff; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(26,82,118,0.2); }
.ht { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 15px; }
.brand { display: flex; align-items: center; gap: 12px; }
.logo { width: 44px; height: 44px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; backdrop-filter: blur(4px); }
.brand h1 { font-size: 1.2rem; font-weight: 800; }
.brand p { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }
.hright { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.hdate { background: rgba(0,0,0,0.15); border-radius: 10px; padding: 6px 12px; font-size: 0.75rem; text-align: center; }
.parent-link, .outbtn { color: #fff; text-decoration: none; padding: 8px 16px; background: rgba(255,255,255,0.15); border-radius: 10px; font-size: 0.85rem; font-weight: 500; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; cursor: pointer; font-family: inherit; }
.parent-link:hover, .outbtn:hover { background: rgba(255,255,255,0.25); }

.ctabs { display: flex; padding: 0 5%; background: rgba(0,0,0,0.1); overflow-x: auto; scrollbar-width: none; }
.ctabs::-webkit-scrollbar { display: none; }
.ctab { padding: 12px 20px; background: transparent; color: rgba(255,255,255,0.7); border: none; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 700; border-bottom: 3px solid transparent; white-space: nowrap; transition: 0.2s; }
.ctab.active { color: #fff; border-bottom-color: var(--a); background: rgba(255,255,255,0.1); }
.cbdg { display: inline-flex; justify-content: center; background: var(--a); color: #fff; border-radius: 50px; padding: 0 6px; font-size: 0.7rem; margin-right: 6px; font-weight: 800; }

/* Main Layout */
main { max-width: 1200px; margin: 0 auto; padding: 30px 5%; display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: start; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; grid-column: 1 / -1; }
.stat { background: #fff; border-radius: 16px; padding: 16px 20px; box-shadow: var(--sh); display: flex; align-items: center; gap: 14px; transition: 0.2s; }
.stat:hover { transform: translateY(-3px); box-shadow: var(--sh-hover); }
.si { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.stat h3 { font-size: 1.5rem; font-weight: 800; }

/* Cards & Items */
.card { background: #fff; border-radius: 16px; box-shadow: var(--sh); overflow: hidden; margin-bottom: 24px; }
.ch { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--bd); background: #fafbfc; }
.ct { display: flex; align-items: center; gap: 10px; font-size: 1.05rem; font-weight: 700; color: var(--p); }
.ci { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.cb { padding: 20px; }

.ntabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
.ntab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--bd); background: #fff; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 600; color: var(--mu); transition: 0.2s; white-space: nowrap; }
.ntab.active { background: var(--p); color: #fff; border-color: var(--p); }

.ni { border-radius: 12px; padding: 16px; border-right: 4px solid transparent; position: relative; margin-bottom: 12px; animation: fi 0.3s ease; }
.ni.homework { background: #f4f9fd; border-color: var(--s); }
.ni.activity { background: #eefaf3; border-color: var(--g); }
.ni.alert { background: #fffaf0; border-color: var(--a); }
.nm { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.ctag, .ttag { font-size: 0.75rem; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
.ctag { background: var(--p); color: #fff; }
.ttag { background: rgba(0,0,0,0.05); }
.ndel { position: absolute; top: 12px; left: 12px; background: #fff; border: 1px solid #eee; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; color: #aaa; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
.ndel:hover { color: var(--r); border-color: var(--r); background: #fdf2f2; }
.ni strong { font-size: 1.1rem; color: #000; display: block; margin-bottom: 6px; font-weight: 800; }
.n-body-text { white-space: pre-wrap; font-size: 0.95rem; color: #2c3e50; line-height: 1.6; }
.notice-img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 1px solid rgba(0,0,0,0.05); }

/* Inputs & Modals */
.fc { width: 100%; padding: 10px 14px; border: 2px solid var(--bd); border-radius: 10px; font-family: inherit; font-size: 0.95rem; background: #fff; transition: 0.2s; resize: vertical; }
.fc:focus { outline: none; border-color: var(--s); box-shadow: 0 0 0 3px rgba(46,134,193,0.1); }
.sbtn, .abtn { padding: 10px 16px; border: none; border-radius: 10px; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: 0.2s; color: #fff; }
.abtn { background: linear-gradient(135deg, var(--p), var(--s)); padding: 8px 16px; font-size: 0.85rem; }
.sbtn { background: linear-gradient(135deg, var(--g), #1e8449); width: 100%; }
.sbtn:hover, .abtn:hover { opacity: 0.9; transform: translateY(-1px); }

.overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 20px; padding: 24px; width: 100%; max-width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: su 0.3s ease; max-height: 90vh; overflow-y: auto; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 6px; color: var(--p); }

.qi { background: #fafbfc; border: 1px solid var(--bd); border-radius: 12px; padding: 16px; margin-bottom: 12px; border-right: 4px solid var(--a); }
.qtxt, .reply-preview { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; padding: 10px; background: #fff; border-radius: 8px; border: 1px solid #eee; margin: 10px 0; }
.reply-preview { background: #e8f8f0; border-color: #bce8d1; color: #1e8449; }

#loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, var(--bg), #d6eaf8); }
.lbox { background: #fff; border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; box-shadow: var(--sh); text-align: center; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; z-index: 400; transition: transform 0.4s; }
.toast.show { transform: translateX(-50%) translateY(0); }
#app { display: none; }

@keyframes fi { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
@keyframes su { from { opacity: 0; transform: translateY(20px) scale(0.95) } to { opacity: 1; transform: translateY(0) scale(1) } }

@media (max-width: 900px) { main { grid-template-columns: 1fr; } }
@media (max-width: 600px) {
  .ht { flex-direction: column; justify-content: center; }
  .hright { justify-content: center; width: 100%; }
  .fc { font-size: 16px; } /* يمنع زووم الآيفون التلقائي */
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div style="font-size:40px; margin-bottom:10px">🔐</div>
    <h1 style="color:var(--p); margin-bottom:20px">لوحة المعلم</h1>
    <input type="password" class="fc" id="pwdInput" placeholder="كلمة المرور" style="margin-bottom:15px; text-align:center" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="sbtn" onclick="doLogin()">دخول</button>
    <div id="loginErr" style="color:var(--r); display:none; margin-top:10px; font-size:0.85rem">كلمة السر غير صحيحة</div>
  </div>
</div>

<div id="app">
<header>
  <div class="ht">
    <div class="brand"><div class="logo">📚</div><div><h1>لوحة تحكم المعلم</h1><p>الأستاذ خليل</p></div></div>
    <div class="hright"><div class="hdate" id="hdate"></div><a href="index.html" class="parent-link">🏠 الموقع الرئيسي</a><button class="outbtn" onclick="doLogout()">🚪 خروج</button></div>
  </div>
  <div class="ctabs">
    <button class="ctab active" onclick="setClass('all')">📋 الكل</button>
    <button class="ctab" onclick="setClass('5A')">الخامس 1</button>
    <button class="ctab" onclick="setClass('5B')">الخامس 2</button>
    <button class="ctab" onclick="setClass('5C')">الخامس 3</button>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat"><div class="si" style="background:#e1f0fa;color:var(--p)">📌</div><div><h3 id="sN">0</h3><p>ملاحظات</p></div></div>
    <div class="stat"><div class="si" style="background:#fef5e6;color:var(--a)">💬</div><div><h3 id="sQ">0</h3><p>استفسارات</p></div></div>
    <div class="stat"><div class="si" style="background:#e8f8f0;color:var(--g)">✅</div><div><h3 id="sR">0</h3><p>مُجاب</p></div></div>
  </div>

  <div style="display:flex;flex-direction:column;gap:24px">
    <div class="card">
      <div class="ch">
        <div class="ct"><div class="ci" style="background:#e1f0fa">📋</div>إدارة الملاحظات</div>
        <button class="abtn" onclick="openModal()">➕ إضافة</button>
      </div>
      <div class="cb">
        <div class="ntabs">
          <button class="ntab active" onclick="flt('all',this)">الكل</button>
          <button class="ntab" onclick="flt('homework',this)">📝 واجبات</button>
          <button class="ntab" onclick="flt('activity',this)">🎯 أنشطة</button>
          <button class="ntab" onclick="flt('alert',this)">🔔 تنبيهات</button>
        </div>
        <div id="nList"></div>
      </div>
    </div>
    <div class="card">
      <div class="ch"><div class="ct"><div class="ci" style="background:#fef5e6">💬</div>استفسارات أولياء الأمور</div></div>
      <div class="cb"><div id="qList"></div></div>
    </div>
  </div>
</main>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h3 style="color:var(--p)">إضافة ملاحظة جديدة</h3>
      <button onclick="closeModal()" style="background:none; border:none; font-size:20px; cursor:pointer">✕</button>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div class="fg"><label>النوع</label><select class="fc" id="nType"><option value="homework">📝 واجب</option><option value="activity">🎯 نشاط</option><option value="alert">🔔 تنبيه</option></select></div>
      <div class="fg"><label>الشعبة</label><select class="fc" id="nCls"><option value="all">الجميع</option><option value="5A">الخامس 1</option><option value="5B">الخامس 2</option><option value="5C">الخامس 3</option></select></div>
    </div>
    <div class="fg"><label>العنوان</label><input type="text" class="fc" id="nTit" placeholder="مثال: واجب الفاعل"></div>
    <div class="fg"><label>التفاصيل</label><textarea class="fc" id="nDet" rows="3"></textarea></div>
    <div class="fg">
      <label>إرفاق صورة (اختياري)</label>
      <input type="file" id="nImg" class="fc" accept="image/*" onchange="processImage(this)">
      <div id="imgPreview" style="margin-top:10px; display:none"><img src="" style="width:100px; border-radius:8px"></div>
    </div>
    <button class="sbtn" onclick="addNotice()">💾 حفظ ونشر</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxao2vzL5tPFhirn-Bb98Dx9XobBJEH0M89Dzsma2aqvshgzSL4dx6ebPhSgR8WO-WoRQ/exec'; // تأكد من وضع رابط Google Script الخاص بك
const PWD_KEY = 'teacher_pwd'; const STORAGE_KEY = 'school_data_v2';
const CN = {all:'جميع الشعب', '5A':'الخامس 1', '5B':'الخامس 2', '5C':'الخامس 3'};
const TN = {homework:'واجب 📝', activity:'نشاط 🎯', alert:'تنبيه 🔔'};
let curClass = 'all', nFlt = 'all', currentBase64Image = '';

function doLogin() {
  const pwd = localStorage.getItem(PWD_KEY) || 'aysha123';
  if (document.getElementById('pwdInput').value === pwd) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll(); setInterval(renderAll, 30000);
  } else document.getElementById('loginErr').style.display = 'block';
}

function doLogout() { location.reload(); }

async function loadData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {notices:[], queries:[], nId:100};
}

async function renderAll() {
  const d = await loadData();
  
  // Render Notices
  let nf = d.notices.filter(n => (curClass==='all' || n.cls==='all' || n.cls===curClass) && (nFlt==='all' || n.type===nFlt));
  document.getElementById('nList').innerHTML = nf.length ? nf.map(n => `
    <div class="ni ${n.type}">
      <button class="ndel" onclick="delN(${n.id})">✕</button>
      <div class="nm"><div><span class="ctag">${CN[n.cls]}</span> <span class="ttag">${TN[n.type]}</span></div> <small>${n.date}</small></div>
      <strong>${n.title}</strong>
      <div class="n-body-text">${n.det}</div>
      ${n.img ? `<img src="${n.img}" class="notice-img">` : ''}
    </div>`).join('') : '<p style="text-align:center; color:#888; padding:20px">لا توجد ملاحظات</p>';

  // Render Queries
  let qf = d.queries.filter(q => curClass==='all' || q.cls===curClass);
  document.getElementById('qList').innerHTML = qf.length ? qf.map(q => `
    <div class="qi">
      <div style="display:flex; justify-content:space-between"><strong>👤 ${q.name}</strong> <small>${q.date}</small></div>
      <div class="qtxt">${q.msg}</div>
      ${q.reply ? `<div class="reply-preview"><strong>رد الأستاذ:</strong><br>${q.reply}</div>` : ''}
      <textarea class="fc" id="rt${q.id}" rows="2" placeholder="اكتب ردك هنا...">${q.reply||''}</textarea>
      <button class="sbtn" style="margin-top:8px" onclick="sendR(${q.id})">إرسال الرد</button>
    </div>`).join('') : '<p style="text-align:center; color:#888; padding:20px">لا توجد استفسارات</p>';
    
  document.getElementById('sN').innerText = d.notices.length;
  document.getElementById('sQ').innerText = d.queries.length;
  document.getElementById('sR').innerText = d.queries.filter(q=>q.status==='replied').length;
}

function setClass(c) { curClass = c; document.querySelectorAll('.ctab').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderAll(); }
function flt(f, btn) { nFlt = f; document.querySelectorAll('.ntab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderAll(); }

function openModal() { document.getElementById('modal').classList.add('open'); currentBase64Image = ''; document.getElementById('imgPreview').style.display='none'; document.getElementById('nImg').value=''; }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ضغط الصورة قبل حفظها
function processImage(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 600; // تقليل حجم الصورة
        let w = img.width, h = img.height;
        if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        currentBase64Image = canvas.toDataURL('image/jpeg', 0.6); // 60% Quality
        const prev = document.getElementById('imgPreview');
        prev.style.display = 'block'; prev.querySelector('img').src = currentBase64Image;
      }
      img.src = e.target.result;
    }
    reader.readAsDataURL(input.files[0]);
  }
}

async function addNotice() {
  const d = await loadData();
  const t = document.getElementById('nTit').value.trim();
  if(!t) return alert('أدخل العنوان');
  
  d.notices.unshift({
    id: ++d.nId, type: document.getElementById('nType').value, cls: document.getElementById('nCls').value,
    title: t, det: document.getElementById('nDet').value, img: currentBase64Image,
    date: new Date().toLocaleString('ar-OM', {hour:'2-digit',minute:'2-digit', day:'numeric', month:'short'})
  });
  
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  closeModal(); renderAll(); toast('تمت الإضافة');
  fetch(API_URL, {method:'POST', body: new URLSearchParams({action:'saveNotices', data:JSON.stringify(d.notices)})});
}

function toast(msg) { const t = document.getElementById('toast'); t.innerHTML = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
</script>
</body>
</html>
