<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منطقة المعلم - الأستاذ خليل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* نفس التنسيقات الأساسية من الصفحة الرئيسية مع بعض الإضافات */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #f5f7fa;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header, .header-content, .brand, .brand-icon, .brand-text, .date-badge { /* reuse */ }
    .main { max-width: 1200px; margin:24px auto; padding:0 24px; flex:1; width:100%; }

    /* استمارة الدخول */
    .login-box {
      max-width: 380px;
      margin: 60px auto;
      background: white;
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.05);
      border: 1px solid #ecf1f6;
      text-align: center;
    }
    .login-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .login-sub {
      color: #475569;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    .input-field {
      width: 100%;
      padding: 14px 20px;
      background: #f8fafc;
      border: 1.5px solid #dbe0e6;
      border-radius: 50px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      color: #1e293b;
      margin-bottom: 18px;
      direction: ltr;
      text-align: left;
    }
    .input-field:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
    }
    .btn {
      background: #2563eb;
      border: none;
      border-radius: 50px;
      padding: 12px 24px;
      font-family: 'Cairo', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .btn-outline {
      background: white;
      border: 2px solid #2563eb;
      color: #2563eb;
    }
    .error-msg {
      color: #b91c1c;
      font-size: 0.75rem;
      margin-top: 12px;
    }

    /* لوحة التحكم */
    .dashboard {
      display: none;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .small-btn {
      background: white;
      border: 1px solid #dbe0e6;
      border-radius: 40px;
      padding: 8px 18px;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.15s;
    }
    .small-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    .small-btn.danger {
      color: #b91c1c;
      border-color: #fecaca;
    }
    .small-btn.danger:hover {
      background: #fee2e2;
    }

    /* نموذج الإضافة */
    .form-panel {
      background: white;
      border-radius: 24px;
      padding: 24px;
      border: 1px solid #ecf1f6;
      margin-bottom: 32px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.02);
    }
    .form-row {
      margin-bottom: 18px;
    }
    .form-row label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #475569;
      margin-bottom: 4px;
    }
    .form-control, .form-select {
      width: 100%;
      padding: 10px 14px;
      background: #f8fafc;
      border: 1px solid #dbe0e6;
      border-radius: 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      color: #1e293b;
    }
    .form-control:focus, .form-select:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
    }
    .radio-group, .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }
    .radio-group label, .checkbox-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* قائمة الملاحظات للإدارة */
    .admin-card {
      background: white;
      border-radius: 20px;
      padding: 18px;
      border: 1px solid #ecf1f6;
      margin-bottom: 16px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    .admin-tags { display: flex; gap:6px; flex-wrap: wrap; }
    .admin-actions { display: flex; gap:8px; }
    .admin-title { font-weight:800; font-size:1rem; margin-bottom:6px; }
    .admin-desc { font-size:0.85rem; color:#475569; }
    .admin-meta { font-size:0.7rem; color:#64748b; margin-top:8px; }

    /* حالات */
    .loading { text-align:center; padding:50px; color:#64748b; }
    .spinner { /* نفس السابق */ }

    @media (max-width:640px) {
      .main { padding:0 16px; }
      .toolbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="brand">
        <div class="brand-icon">🔐</div>
        <div class="brand-text">
          <h1>منطقة المعلم</h1>
          <p>الأستاذ خليل · إدارة الملاحظات</p>
        </div>
      </div>
      <div class="date-badge" id="currentDate"></div>
    </div>
  </header>

  <!-- قسم تسجيل الدخول -->
  <div id="loginSection" class="login-box">
    <div class="login-title">دخول المعلم</div>
    <div class="login-sub">الرجاء إدخال كلمة المرور الخاصة بك</div>
    <input type="password" id="passwordInput" class="input-field" placeholder="كلمة المرور">
    <button class="btn" onclick="attemptLogin()">دخول</button>
    <div id="loginError" class="error-msg"></div>
  </div>

  <!-- لوحة التحكم (تظهر بعد تسجيل الدخول) -->
  <div id="dashboard" class="dashboard">
    <main class="main">
      <div class="toolbar">
        <button class="small-btn" onclick="logout()">🚪 تسجيل الخروج</button>
        <button class="small-btn" id="toggleFormBtn" onclick="toggleForm()">➕ إضافة ملاحظة جديدة</button>
      </div>

      <!-- نموذج إضافة/تعديل ملاحظة -->
      <div id="noticeForm" class="form-panel" style="display: none;">
        <h3 style="margin-bottom:16px; color:#0f172a;" id="formTitle">إضافة ملاحظة جديدة</h3>
        <input type="hidden" id="editId" value="">

        <div class="form-row">
          <label>العنوان</label>
          <input type="text" id="title" class="form-control" placeholder="مثال: واجب الصفحة 25">
        </div>
        <div class="form-row">
          <label>التفاصيل (اختياري)</label>
          <textarea id="details" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-row">
          <label>رابط الصورة (اختياري)</label>
          <input type="url" id="img" class="form-control" placeholder="https://...">
        </div>
        <div class="form-row">
          <label>التاريخ (YYYY-MM-DD)</label>
          <input type="text" id="date" class="form-control" placeholder="2025-03-03">
        </div>
        <div class="form-row">
          <label>النوع</label>
          <div class="radio-group">
            <label><input type="radio" name="type" value="homework" checked> 📝 واجب</label>
            <label><input type="radio" name="type" value="activity"> 🎯 نشاط</label>
            <label><input type="radio" name="type" value="alert"> 🔔 تنبيه</label>
          </div>
        </div>
        <div class="form-row">
          <label>الشعبة</label>
          <select id="cls" class="form-select">
            <option value="all">جميع الشعب</option>
            <option value="5A">الخامس 1</option>
            <option value="5B">الخامس 2</option>
            <option value="5C">الخامس 3</option>
          </select>
        </div>
        <div class="form-row">
          <div class="checkbox-group">
            <label><input type="checkbox" id="isImp"> ⭐ مهمة</label>
          </div>
        </div>
        <div class="actions">
          <button class="small-btn" onclick="cancelEdit()">إلغاء</button>
          <button class="btn" style="width:auto;" onclick="saveNotice()">حفظ</button>
        </div>
      </div>

      <!-- قائمة الملاحظات مع إمكانية التعديل والحذف -->
      <div id="noticesList" class="loading">جاري التحميل...</div>
    </main>
  </div>

  <footer class="footer">
    <a href="index.html">🏠 العودة للبوابة</a>
    <div class="footer-copy">© 2026 · الأستاذ خليل البلوشي</div>
  </footer>

  <script>
    // ---------- الإعدادات ----------
    const API = 'https://script.google.com/macros/s/AKfycbxao2vzL5tPFhirn-Bb98Dx9XobBJEH0M89Dzsma2aqvshgzSL4dx6ebPhSgR8WO-WoRQ/exec';
    const STORAGE_KEY = 'school_data_v2';
    const TEACHER_PASSWORD = 'aysha123'; // قم بتغييرها

    let notices = [];
    let isAuthenticated = false;

    // العناصر
    const loginSection = document.getElementById('loginSection');
    const dashboard = document.getElementById('dashboard');
    const loginError = document.getElementById('loginError');
    const noticeForm = document.getElementById('noticeForm');
    const formTitle = document.getElementById('formTitle');
    const editId = document.getElementById('editId');
    const noticesList = document.getElementById('noticesList');
    const toggleFormBtn = document.getElementById('toggleFormBtn');

    // تحديث التاريخ
    function updateDateTime() {
      const d = new Date();
      document.getElementById('currentDate').innerText = 
        d.toLocaleDateString('ar-EG', { weekday:'short', month:'short', day:'numeric' }) +
        ' · ' + d.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
    }
    updateDateTime();
    setInterval(updateDateTime, 60000);

    // تحميل البيانات
    async function loadData() {
      try {
        const res = await fetch(`${API}?action=loadData&t=${Date.now()}`);
        const json = await res.json();
        if (json.status === 'success') {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(json.data));
          return json.data;
        }
      } catch (e) {}
      const local = localStorage.getItem(STORAGE_KEY);
      return local ? JSON.parse(local) : { notices: [] };
    }

    // حفظ البيانات إلى الخادم (محاكاة)
    async function saveDataToServer(updatedNotices) {
      try {
        await fetch(`${API}?action=saveData`, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notices: updatedNotices })
        });
      } catch (e) {}
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ notices: updatedNotices }));
    }

    // عرض الملاحظات في لوحة الإدارة
    function renderAdminNotices() {
      if (!notices.length) {
        noticesList.innerHTML = '<div class="empty-state"><span>📋</span><p>لا توجد ملاحظات بعد</p></div>';
        return;
      }

      const html = notices.map((note, index) => {
        const typeClass = note.type === 'homework' ? 'homework' : note.type === 'activity' ? 'activity' : 'alert';
        return `
          <div class="admin-card">
            <div class="admin-header">
              <div class="admin-tags">
                <span class="tag">${note.cls === 'all' ? 'جميع الشعب' : (note.cls === '5A' ? 'الخامس 1' : note.cls === '5B' ? 'الخامس 2' : 'الخامس 3')}</span>
                <span class="tag ${typeClass}">${note.type === 'homework' ? 'واجب' : note.type === 'activity' ? 'نشاط' : 'تنبيه'}</span>
                ${note.isImp ? '<span class="tag important">⭐ مهمة</span>' : ''}
              </div>
              <div class="admin-actions">
                <button class="small-btn" onclick="editNotice(${index})">✏️</button>
                <button class="small-btn danger" onclick="deleteNotice(${index})">🗑️</button>
              </div>
            </div>
            <div class="admin-title">${note.title}</div>
            ${note.det ? `<div class="admin-desc">${note.det.substring(0,100)}${note.det.length>100?'...':''}</div>` : ''}
            <div class="admin-meta">${note.date || ''} · ${note.img ? '🖼️ صورة' : ''}</div>
          </div>
        `;
      }).join('');
      noticesList.innerHTML = html;
    }

    // تحديث البيانات وإعادة الرسم
    async function refreshNotices() {
      const data = await loadData();
      notices = data.notices || [];
      renderAdminNotices();
    }

    // تسجيل الدخول
    window.attemptLogin = function() {
      const pwd = document.getElementById('passwordInput').value;
      if (pwd === TEACHER_PASSWORD) {
        isAuthenticated = true;
        loginSection.style.display = 'none';
        dashboard.style.display = 'block';
        loginError.innerText = '';
        refreshNotices();
      } else {
        loginError.innerText = '❌ كلمة المرور غير صحيحة';
      }
    };

    window.logout = function() {
      isAuthenticated = false;
      loginSection.style.display = 'block';
      dashboard.style.display = 'none';
      document.getElementById('passwordInput').value = '';
    };

    // إظهار/إخفاء النموذج
    window.toggleForm = function() {
      if (noticeForm.style.display === 'none') {
        noticeForm.style.display = 'block';
        toggleFormBtn.innerText = '✖️ إغلاق';
      } else {
        noticeForm.style.display = 'none';
        toggleFormBtn.innerText = '➕ إضافة ملاحظة جديدة';
        cancelEdit();
      }
    };

    window.cancelEdit = function() {
      editId.value = '';
      document.getElementById('title').value = '';
      document.getElementById('details').value = '';
      document.getElementById('img').value = '';
      document.getElementById('date').value = '';
      document.querySelectorAll('[name="type"]').forEach(r => r.checked = false);
      document.querySelector('[value="homework"]').checked = true;
      document.getElementById('isImp').checked = false;
      document.getElementById('cls').value = 'all';
      formTitle.innerText = 'إضافة ملاحظة جديدة';
    };

    window.editNotice = function(index) {
      const note = notices[index];
      if (!note) return;
      editId.value = index;
      document.getElementById('title').value = note.title || '';
      document.getElementById('details').value = note.det || '';
      document.getElementById('img').value = note.img || '';
      document.getElementById('date').value = note.date || '';
      document.querySelectorAll('[name="type"]').forEach(r => {
        if (r.value === note.type) r.checked = true;
      });
      document.getElementById('isImp').checked = note.isImp || false;
      document.getElementById('cls').value = note.cls || 'all';
      formTitle.innerText = 'تعديل الملاحظة';
      noticeForm.style.display = 'block';
      toggleFormBtn.innerText = '✖️ إغلاق';
    };

    window.saveNotice = async function() {
      const index = editId.value;
      const notice = {
        title: document.getElementById('title').value.trim(),
        det: document.getElementById('details').value.trim() || undefined,
        img: document.getElementById('img').value.trim() || undefined,
        date: document.getElementById('date').value.trim() || new Date().toISOString().slice(0,10),
        type: document.querySelector('[name="type"]:checked')?.value || 'homework',
        isImp: document.getElementById('isImp').checked,
        cls: document.getElementById('cls').value,
        isDone: false
      };
      if (!notice.title) {
        alert('العنوان مطلوب');
        return;
      }

      if (index !== '') {
        // تعديل
        notices[parseInt(index)] = notice;
      } else {
        // إضافة
        notices.push(notice);
      }

      await saveDataToServer(notices);
      await refreshNotices();
      cancelEdit();
      noticeForm.style.display = 'none';
      toggleFormBtn.innerText = '➕ إضافة ملاحظة جديدة';
    };

    window.deleteNotice = async function(index) {
      if (!confirm('هل أنت متأكد من الحذف؟')) return;
      notices.splice(index, 1);
      await saveDataToServer(notices);
      await refreshNotices();
    };

    // تحميل أولي
    (async () => {
      const data = await loadData();
      notices = data.notices || [];
    })();
  </script>
</body>
</html>
