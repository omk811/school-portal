<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم المعلم — الأستاذ خليل البلوشي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --p:#1a5276; --s:#2e86c1; --a:#f39c12; --g:#27ae60; --r:#e74c3c;
  --bd:#d5e8f5; --bg:#f4f9fd; --mu:#7f8c8d; --text:#1c2833;
  --sh:0 10px 30px rgba(26,82,118,0.06);
  --sh-hover:0 15px 35px rgba(26,82,118,0.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,var(--bg),#d6eaf8)}
.lbox{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:var(--sh);text-align:center}
.llogo{width:70px;height:70px;background:linear-gradient(135deg,var(--p),var(--s));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px}
.linput{width:100%;padding:14px;border:2px solid var(--bd);border-radius:12px;font-size:16px;text-align:center;margin-bottom:16px}
.lbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
.lerr{color:var(--r);font-size:0.85rem;margin-top:12px;display:none}

#app{display:none}
header{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;position:sticky;top:0;z-index:100}
.ht{display:flex;align-items:center;justify-content:space-between;padding:16px 5%;flex-wrap:wrap;gap:15px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.hright{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hdate{background:rgba(0,0,0,0.15);border-radius:10px;padding:6px 12px;font-size:0.75rem;text-align:center}
.parent-link,.outbtn{color:#fff;text-decoration:none;padding:8px 16px;background:rgba(255,255,255,0.15);border-radius:10px;font-size:0.85rem;border:1px solid rgba(255,255,255,0.2);cursor:pointer}
.parent-link:hover,.outbtn:hover{background:rgba(255,255,255,0.25)}

main{max-width:1100px;margin:0 auto;padding:30px 5%}
.card{background:#fff;border-radius:16px;box-shadow:var(--sh);overflow:hidden;margin-bottom:24px}
.ch{padding:16px 20px;border-bottom:1px solid var(--bd);background:#fafbfc;font-weight:700;color:var(--p)}
.cb{padding:20px}
.notice-img{width:100%;max-height:250px;object-fit:cover;border-radius:10px;margin-top:15px;border:1px solid rgba(0,0,0,0.1)}
.sbtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--g),#1e8449);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:12px 24px;border-radius:30px;font-weight:600;transition:transform .4s}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">🔐</div>
    <h1>لوحة تحكم المعلم</h1>
    <input type="password" class="linput" id="pwdInput" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">تسجيل الدخول</button>
    <div class="lerr" id="loginErr">كلمة السر غير صحيحة</div>
  </div>
</div>

<div id="app">
<header>
  <div class="ht">
    <div class="brand">
      <div class="logo">📚</div>
      <div>
        <h1>لوحة تحكم المعلم</h1>
        <p>الأستاذ خليل — الصف الخامس</p>
      </div>
    </div>

    <div class="hright">
      <div class="hdate" id="hdate"></div>
      <button class="outbtn" onclick="manualRefresh()">🔄 تحديث</button>
      <a href="index.html" class="parent-link">🏠 الموقع الرئيسي</a>
      <button class="outbtn" onclick="doLogout()">🚪 خروج</button>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <div class="ch">الملاحظات</div>
    <div class="cb" id="nList"></div>
  </div>
</main>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'ضع_رابط_السكريبت_هنا';
const PWD_KEY='teacher_pwd';
const STORAGE_KEY='school_data_v2';

const defaultData={
  notices:[
    {id:1,title:'واجب الفاعل',det:'حل صفحة 25',date:'2026-03-02'}
  ]
};

function makeLinksClickable(text){
  if(!text)return '';
  const pattern=/(https?:\/\/[^\s]+)|(www\.[^\s]+)/gi;
  return text.replace(pattern,url=>{
    let href=url.startsWith('www')?'http://'+url:url;
    return `<a href="${href}" target="_blank">${url}</a>`;
  });
}

async function getPassword(){
  return localStorage.getItem(PWD_KEY)||'aysha123';
}

async function doLogin(){
  const pwd=await getPassword();
  if(document.getElementById('pwdInput').value===pwd){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }else{
    document.getElementById('loginErr').style.display='block';
  }
}

function doLogout(){
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('pwdInput').value='';
}

async function loadData(){
  try{
    const res=await fetch(`${API_URL}?action=loadData&t=${Date.now()}`);
    const json=await res.json();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(json.data));
    return json.data;
  }catch(e){
    return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaultData;
  }
}

async function initApp(){
  upDate();        // مرة واحدة فقط
  await render();  // تحميل عند الدخول فقط
}

async function manualRefresh(){
  toast('🔄 جاري التحديث...');
  await render();
  upDate();
  toast('✅ تم التحديث');
}

async function render(){
  const d=await loadData();
  renderN(d);
}

function renderN(d){
  const el=document.getElementById('nList');
  if(!d.notices.length){
    el.innerHTML='<p>لا توجد ملاحظات</p>';
    return;
  }
  el.innerHTML=d.notices.map(n=>`
    <div style="margin-bottom:15px;padding:15px;border:1px solid #eee;border-radius:10px">
      <strong>${n.title}</strong><br>
      <div>${makeLinksClickable(n.det)}</div>
      <small>${n.date}</small>
    </div>
  `).join('');
}

function upDate(){
  const d=new Date();
  document.getElementById('hdate').innerHTML=
    d.toLocaleDateString('ar-OM')+'<br><small>'+
    d.toLocaleTimeString('ar-OM',{hour:'2-digit',minute:'2-digit'})+
    '</small>';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>

</body>
</html>
