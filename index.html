<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التواصل مع الأستاذ خليل</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الأستاذ خليل">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3429/3429149.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --p: #1a5276; --s: #2e86c1; --a: #f39c12; --g: #27ae60; --r: #e74c3c;
  --bd: #d5e8f5; --bg: #f4f9fd; --mu: #7f8c8d; --text: #1c2833;
  --sh: 0 10px 30px rgba(26,82,118,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  font-family: 'Tajawal', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
  line-height: 1.5; /* مسافة افتراضية مريحة بين الأسطر */
  -webkit-font-smoothing: antialiased;
}

/* تحسين الروابط */
.clickable-link { 
  color: var(--s); 
  text-decoration: underline; 
  font-weight: bold; 
  word-break: break-all; 
}

/* تنسيق الملاحظات والمسافات */
.n-det {
  font-size: 1.1rem;
  line-height: 1.7; /* مسافة أسطر مريحة جداً لقراءة الواجبات */
  color: #2c3e50;
  margin-top: 10px;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.ni strong {
  display: block;
  font-size: 1.3rem;
  line-height: 1.4;
  margin-bottom: 5px;
  color: #000;
}

/* نافذة تكبير الصور */
.image-modal { 
  display: none; 
  position: fixed; 
  z-index: 10000; 
  left: 0; top: 0; 
  width: 100%; height: 100%; 
  background: rgba(0,0,0,0.9); 
  align-items: center; justify-content: center; 
  cursor: pointer; 
}
.modal-content { 
  max-width: 90%; max-height: 80%; 
  border-radius: 10px; 
  animation: zoom 0.3s ease; 
}
@keyframes zoom { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }

.notice-img { 
  cursor: pointer; 
  transition: 0.3s; 
  width: 100%; 
  max-height: 350px; 
  object-fit: cover; 
  border-radius: 12px; 
  margin-top: 15px; 
  border: 1px solid rgba(0,0,0,0.08); 
}

/* باقي التصاميم (Header, Tabs, Cards) */
header { background: linear-gradient(135deg, var(--p), var(--s)); color: #fff; box-shadow: 0 4px 20px rgba(26,82,118,0.15); position: sticky; top: 0; z-index: 100; }
.ht { display: flex; align-items: center; justify-content: space-between; padding: 16px 5%; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 15px; }
.brand { display: flex; align-items: center; gap: 12px; }
.logo { width: 48px; height: 48px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.brand h1 { font-size: 1.25rem; font-weight: 800; }

.ctabs { display: flex; padding: 0 5%; background: rgba(0,0,0,0.1); overflow-x: auto; scrollbar-width: none; }
.ctab { padding: 12px 20px; background: transparent; color: rgba(255,255,255,0.7); border: none; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 700; border-bottom: 3px solid transparent; white-space: nowrap; }
.ctab.active { color: #fff; border-bottom-color: var(--a); background: rgba(255,255,255,0.1); }
.cbdg { display: inline-flex; align-items: center; justify-content: center; background: var(--a); color: #fff; border-radius: 50px; padding: 0 6px; height: 20px; font-size: 0.7rem; margin-right: 6px; }

main { max-width: 1150px; margin: 0 auto; padding: 30px 5%; display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
.welcome { background: linear-gradient(135deg, var(--s), var(--p)); border-radius: 20px; padding: 24px; color: #fff; box-shadow: var(--sh); grid-column: 1 / -1; display: flex; align-items: center; gap: 20px; }
.wicon { font-size: 40px; background: rgba(255,255,255,0.2); width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; border-radius: 18px; }

.card { background: #fff; border-radius: 20px; box-shadow: var(--sh); overflow: hidden; margin-bottom: 24px; }
.ch { padding: 16px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--bd); background: #fafbfc; color: var(--p); font-weight: 700; }
.cb { padding: 20px; }

.ni { border-radius: 12px; padding: 16px; border-right: 4px solid transparent; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
.ni.homework { background: #f4f9fd; border-color: var(--s); }
.ni.activity { background: #eefaf3; border-color: var(--g); }
.ni.alert { background: #fffaf0; border-color: var(--a); }

.pf { background: linear-gradient(135deg, #2c3e50, var(--p)); border-radius: 20px; padding: 20px; box-shadow: var(--sh); color: #fff; }
.fc { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 12px; font-family: inherit; font-size: 1rem; }
.psbtn { width: 100%; padding: 14px; background: var(--a); color: #fff; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 1rem; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: #fff; padding: 12px 24px; border-radius: 30px; transition: 0.4s; z-index: 10000; font-weight: 600; }
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 900px) { main { grid-template-columns: 1fr; } }
@media (max-width: 600px) { .welcome { flex-direction: column; text-align: center; } }
</style>
</head>
<body>

<header>
  <div class="ht">
    <div class="brand">
      <div class="logo">📚</div>
      <div><h1>تواصل الأستاذ خليل</h1><p>اللغة العربية · الصف الخامس</p></div>
    </div>
    <div class="hright">
      <div id="hdate" style="font-size: 0.8rem; text-align: left;"></div>
      <a href="teacher.html" style="color:white; text-decoration:none; background:rgba(255,255,255,0.2); padding:5px 12px; border-radius:8px; font-size:0.8rem;">دخول المعلم</a>
    </div>
  </div>
  <div class="ctabs">
    <button class="ctab active" onclick="setClass('all')">📋 جميع الملاحظات</button>
    <button class="ctab" onclick="setClass('5A')"><span class="cbdg" id="b5A">0</span>خامس 1</button>
    <button class="ctab" onclick="setClass('5B')"><span class="cbdg" id="b5B">0</span>خامس 2</button>
    <button class="ctab" onclick="setClass('5C')"><span class="cbdg" id="b5C">0</span>خامس 3</button>
  </div>
</header>

<main>
  <div class="welcome">
    <div class="wicon">👋</div>
    <div><h2>أهلاً بأولياء الأمور</h2><p>هذه المساحة مخصصة لمتابعة كل ما يخص المادة العلمية والواجبات اليومية.</p></div>
  </div>

  <div>
    <div class="card">
      <div class="ch">📌 الملاحظات والتنبيهات</div>
      <div class="cb" id="nList"><div style="text-align:center; padding:20px; color:var(--mu)">⏳ جاري تحميل البيانات...</div></div>
    </div>
    <div class="card" id="myCard" style="display:none">
      <div class="ch">📨 رسائلي المستلمة</div>
      <div class="cb" id="myList"></div>
    </div>
  </div>

  <div>
    <div class="pf">
      <h2 style="margin-bottom:10px;">💌 إرسال استفسار</h2>
      <input type="text" class="fc" id="pN" placeholder="اسم ولي الأمر">
      <input type="text" class="fc" id="pS" placeholder="اسم الطالب">
      <select class="fc" id="pC">
        <option value="">— اختر الشعبة —</option>
        <option value="5A">الخامس 1</option>
        <option value="5B">الخامس 2</option>
        <option value="5C">الخامس 3</option>
      </select>
      <textarea class="fc" id="pM" rows="4" placeholder="اكتب سؤالك هنا للأستاذ..."></textarea>
      <button class="psbtn" id="sendBtn" onclick="submitQ()">📤 إرسال الآن</button>
    </div>
  </div>
</main>

<div id="imageModal" class="image-modal" onclick="this.style.display='none'">
  <img class="modal-content" id="fullImage">
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxao2vzL5tPFhirn-Bb98Dx9XobBJEH0M89Dzsma2aqvshgzSL4dx6ebPhSgR8WO-WoRQ/exec';
const STORAGE_KEY = 'school_data_v2';
const MY_KEY = 'my_query_ids';
const CN = {all:'عام', '5A':'خامس 1', '5B':'خامس 2', '5C':'خامس 3'};
const TN = {homework:'واجب 📝', activity:'نشاط 🎯', alert:'تنبيه 🔔'};
let curClass = 'all', cachedData = null;

// PWA تسجيل
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

// معالجة الروابط
function makeLinksClickable(text) {
  if (!text) return '';
  const urlPattern = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/gi;
  return text.toString().replace(urlPattern, function(url) {
    let href = url.startsWith('http') ? url : 'http://' + url;
    return `<a href="${href}" class="clickable-link" target="_blank">${url}</a>`;
  });
}

// تكبير الصور
document.addEventListener('click', e => {
  if (e.target.classList.contains('notice-img')) {
    const m = document.getElementById('imageModal');
    document.getElementById('fullImage').src = e.target.src;
    m.style.display = 'flex';
  }
});

async function loadData() {
  try {
    const res = await fetch(`${API_URL}?action=loadData&t=${Date.now()}`);
    const result = await res.json();
    if(result.status === 'success') {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(result.data));
      return result.data;
    }
  } catch(e) {}
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { notices:[], queries:[], qId:100 };
}

function setClass(c) { 
  curClass = c; 
  document.querySelectorAll('.ctab').forEach((b,i)=>b.classList.toggle('active',[c==='all',c==='5A',c==='5B',c==='5C'][i])); 
  renderUI(); 
}

async function renderUI() {
  if(!cachedData) cachedData = await loadData();
  const el = document.getElementById('nList');
  let filtered = cachedData.notices.filter(n => curClass==='all' || n.cls==='all' || n.cls===curClass);
  
  if (!filtered.length) {
    el.innerHTML = '<div style="text-align:center; padding:30px; opacity:0.5;">لا توجد تحديثات لهذه الشعبة حالياً</div>';
  } else {
    el.innerHTML = filtered.map(n => `
      <div class="ni ${n.type}">
        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:10px; opacity:0.7;">
          <span><b>${CN[n.cls]}</b> | ${TN[n.type]}</span>
          <span>${n.date}</span>
        </div>
        <strong>${n.title}</strong>
        <div class="n-det">${makeLinksClickable(n.det)}</div>
        ${n.img ? `<img src="${n.img}" class="notice-img" alt="مرفق">` : ''}
      </div>`).join('');
  }
  
  ['5A','5B','5C'].forEach(c => {
    const count = cachedData.notices.filter(n=>n.cls===c||n.cls==='all').length;
    document.getElementById('b'+c).textContent = count;
  });
  renderMyMsg();
}

function renderMyMsg() {
  const d = cachedData; 
  if(!d || !d.queries) return;

  // جلب جميع الرسائل التي قام المعلم بالرد عليها فقط (ليراها الجميع)
  const answeredQ = d.queries.filter(q => q.status === 'replied');
  
  const card = document.getElementById('myCard'); 
  const el = document.getElementById('myList');
  
  // إذا لم تكن هناك ردود بعد، أخفِ القسم
  if(!answeredQ.length) {
      card.style.display = 'none';
      return;
  }

  card.style.display = 'block';
  // تغيير العنوان ليكون عاماً
  document.querySelector('#myCard .ch').innerHTML = '<div class="ct"><div class="ci" style="background:#fef5e6">💬</div> استفسارات مجاب عليها</div>';

  el.innerHTML = answeredQ.map(q => `
    <div class="my-msg" style="border-right: 4px solid var(--g); background: #fff; margin-bottom:15px; border: 1px solid #eee; border-right-width:4px; padding:15px; border-radius:12px;">
      <div class="msg-top" style="display:flex; justify-content:space-between; margin-bottom:8px;">
        <span class="msg-student" style="font-weight:bold; color:var(--p);">❓ استفسار من ولي أمر (${CN[q.cls]})</span>
        <span class="ndate" style="font-size:0.8rem; color:var(--mu);">${q.date}</span>
      </div>
      <div class="msg-txt" style="font-size:0.95rem; margin-bottom:10px; color:#555;">${makeLinksClickable(q.msg)}</div>
      <div class="rep-box" style="background:#e8f8f0; border:1px solid #bce8d1; padding:12px; border-radius:8px; color:#1e8449;">
        <strong style="display:block; margin-bottom:5px;">✅ رد الأستاذ خليل:</strong>
        <div style="line-height:1.6;">${makeLinksClickable(q.reply)}</div>
      </div>
    </div>`).join('');
}

async function submitQ() {
  const n = document.getElementById('pN').value.trim();
  const s = document.getElementById('pS').value.trim();
  const c = document.getElementById('pC').value;
  const m = document.getElementById('pM').value.trim();
  if(!n || !s || !c || !m) return toast('يجب إكمال كافة الحقول', '#e74c3c');

  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.innerHTML = '⏳ جاري الإرسال...';
  
  const newId = (cachedData.qId || 200) + 1;
  const newQ = { 
    id: newId, name: n, student: s, cls: c, msg: m, 
    date: new Date().toLocaleDateString('ar-OM') + ' ' + new Date().toLocaleTimeString('ar-OM',{hour:'2-digit',minute:'2-digit'}), 
    status: 'new', reply: '' 
  };
  
  cachedData.queries.unshift(newQ); cachedData.qId = newId;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cachedData));
  
  let myIds = JSON.parse(localStorage.getItem(MY_KEY)) || [];
  myIds.push(newId); localStorage.setItem(MY_KEY, JSON.stringify(myIds));
  
  toast('✅ تم إرسال رسالتك بنجاح');
  ['pN','pS','pM'].forEach(i => document.getElementById(i).value='');
  renderUI();
  btn.disabled = false; btn.innerHTML = '📤 إرسال الآن';
  
  fetch(API_URL, {method:'POST', body: new URLSearchParams({action:'saveQueries', data:JSON.stringify(cachedData.queries)})});
}

function toast(msg, bg='#27ae60') {
  const t = document.getElementById('toast');
  t.style.background = bg; t.innerHTML = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function upDate() {
  const now = new Date();
  document.getElementById('hdate').innerHTML = now.toLocaleTimeString('ar-OM',{hour:'2-digit',minute:'2-digit'}) + '<br>' + now.toLocaleDateString('ar-OM',{month:'short', day:'numeric'});
}
setInterval(upDate, 30000); upDate();
renderUI();
</script>
</body>
</html>
